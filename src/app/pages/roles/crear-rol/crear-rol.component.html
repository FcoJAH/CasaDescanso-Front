<div class="form-container">
  @if (!isRegistered()) {
  <div class="form-card">
    <h3><span class="icon">👥</span> Crear Nuevo Rol</h3>

    <form [formGroup]="rolForm" (ngSubmit)="onSubmit()">
      <div class="grid-layout">

        <div class="form-group full-width">
          <label>Nombre del Rol</label>
          <div class="input-container">
            <input formControlName="name" type="text" placeholder="EJ: ADMINISTRADOR"
              [class.is-valid]="rolForm.get('name')?.valid && rolForm.get('name')?.touched"
              [class.is-invalid]="isFieldInvalid('name')" [class.is-valid]="isFieldValid('name')"
              style="text-transform: uppercase;">
            @if (rolForm.get('name')?.valid && rolForm.get('name')?.touched) {
            <span class="check-icon">✅</span>
            }
          </div>
        </div>

        <div class="form-group full-width">
          <label>Descripción del Cargo</label>
          <div class="input-container">
            <textarea formControlName="description" rows="3" placeholder="Describa las responsabilidades..."
              [class.is-invalid]="isFieldInvalid('description')" [class.is-valid]="isFieldValid('description')"
              class="custom-textarea"
              style="width: 100%; padding: 12px; border: 1.5px solid #E0E4E8; border-radius: 10px; font-size: 1rem; outline: none; box-sizing: border-box;"></textarea>
          </div>
        </div>

      </div>

      <div class="actions" style="margin-top: 25px;">
        <button type="button" class="btn-cancel" (click)="finalizarEdicion()">Cancelar</button>
        <button type="submit" class="btn-submit">Guardar Rol</button>
      </div>
    </form>
  </div>
  } @else {
  <app-success-view [config]="configuracionExito" (onAction)="alConfirmar()" (onExit)="alSalir()">
  </app-success-view>
  }
</div>

@if (showValidationPopup()) {
<app-validation-popup [errors]="formErrors()" (onClose)="showValidationPopup.set(false)">
</app-validation-popup>
}
