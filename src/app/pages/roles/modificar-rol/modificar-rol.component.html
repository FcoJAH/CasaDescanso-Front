<div class="form-container">
  @if (!isUpdated() && !isError()) {
  <div class="form-card">
    <h3><span class="icon">📝</span> Modificar Rol</h3>
    <p class="subtitle">Selecciona un rol para actualizar su información.</p>

    <div class="form-group full-width">
      <label>Seleccionar Rol a modificar:</label>
      <select class="custom-select" (change)="onSeleccionarRol($event)">
        <option value="" [disabled]="!estadoIncial()">-- Elija un rol --</option>
        @for (rol of roles(); track rol.id) {
        <option [value]="rol.id">{{ rol.name }}</option>
        }
      </select>
    </div>

    @if (isLoaded()) {
    <div class="separator" style="height: 1px; background: #E0E4E8; margin: 25px 0;"></div>

    <form [formGroup]="rolForm" (ngSubmit)="onSubmit()">
      <div class="form-group full-width">
        <label>Nombre del Rol</label>
        <input formControlName="name" type="text" placeholder="Ej: ENFERMERO" style="text-transform: uppercase;"
          [class.is-invalid]="isFieldInvalid('name')" [class.is-valid]="isFieldValid('name')">
      </div>

      <div class="form-group full-width">
        <label>Descripción</label>
        <textarea formControlName="description" rows="3" placeholder="Descripción de las funciones..."
          [class.is-invalid]="isFieldInvalid('description')" [class.is-valid]="isFieldValid('description')">
        </textarea>
      </div>

      <div class="actions">
        <button type="button" class="btn-cancel" (click)="resetVista()">Cancelar</button>
        <button type="submit" class="btn-submit">Guardar Cambios</button>
      </div>
    </form>
    }
  </div>
  }

  @else if (isError()) {
  <div class="success-card">
    <div class="success-content">
      <div class="success-icon">⚠️</div>
      <h2>No se pudo actualizar</h2>
      <div class="info-box" style="border-left: 5px solid #F9A825;">
        <p>{{ errorMessage() }}</p>
      </div>
      <button class="btn-back" (click)="resetVista()">Entendido</button>
    </div>
  </div>
  }

  @else if (isUpdated()) {
  <app-success-view [config]="configuracionExito" (onAction)="alConfirmar()" (onExit)="alSalir()">
  </app-success-view>
  }
</div>

@if (showValidationPopup()) {
<app-validation-popup [errors]="formErrors()" (onClose)="showValidationPopup.set(false)">
</app-validation-popup>
}
