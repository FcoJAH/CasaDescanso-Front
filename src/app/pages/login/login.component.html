<div class="login-wrapper">
  <div class="login-card">
    <div class="logo-container">
      <img src="images/CD_Login.png" alt="Casa Descanso">
    </div>

    <h2>Iniciar Sesión</h2>

    <form (ngSubmit)="onLogin()">
      <div class="form-group">
        <input type="text" placeholder="Usuario" [(ngModel)]="username" name="username" required />
      </div>

      <div class="form-group">
        <div class="input-wrapper">
          <input 
            [type]="isPasswordVisible() ? 'text' : 'password'" 
            placeholder="Contraseña" 
            [(ngModel)]="password" 
            name="password" 
            required />
          
          <button type="button" class="btn-eye" (click)="togglePasswordVisibility()">
            {{ isPasswordVisible() ? '🙈' : '🙉' }}
          </button>
        </div>
      </div>

      <button type="submit" [disabled]="loading" class="btn-submit">
        <span *ngIf="!loading">Ingresar</span>
        <span *ngIf="loading" class="spinner"></span>
      </button>

      <p class="error" *ngIf="errorMessage">
        {{ errorMessage }}
      </p>
    </form>
  </div>
</div>
