@if (showAnnouncement()) {
  <div class="announcement-overlay">
    <div class="announcement-content">
      <div class="image-container">
        <img src="images/support-announcement.jpg" alt="Nueva funcionalidad de soporte" />
      </div>
      <div class="actions">
        <button class="btn-accept" (click)="accept()" [disabled]="isAccepting">
          {{ isAccepting ? 'Guardando...' : '¡Entendido!' }}
        </button>
      </div>
    </div>
  </div>
}
